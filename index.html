<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Limpeza do Campo</title>

  <link rel="stylesheet" href="reset.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="scene">

    <div class="sky">
      <div class="sun"></div>

      <div class="cloud cloud1"></div>
      <div class="cloud cloud2"></div>
    </div>

    <div class="mountains"></div>

    <div class="field">

      <div class="grass"></div>

      <div class="trash trash1"></div>
      <div class="trash trash2"></div>
      <div class="trash trash3"></div>
      <div class="trash trash4"></div>
      <div class="trash trash5"></div>

      <div class="man" id="man">

        <div class="head"></div>

        <div class="body"></div>

        <div class="arm left-arm"></div>
        <div class="arm right-arm"></div>

        <div class="leg left-leg"></div>
        <div class="leg right-leg"></div>

        <div class="broom-stick"></div>
        <div class="broom-brush"></div>

      </div>

    </div>

    <div class="title">
      🌱 Limpeza Sustentável do Campo
    </div>

  </div>

  <script src="main.js"></script>
</body>
</html>
