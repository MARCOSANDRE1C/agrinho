<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Campo Realista</title>

  <link rel="stylesheet" href="reset.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="scene">

  <!-- CÉU -->
  <div class="sky">
    <div class="sun"></div>

    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>
  </div>

  <!-- MONTANHAS -->
  <div class="mountains"></div>

  <!-- CAMPO -->
  <div class="ground">

    <!-- GRAMA -->
    <div class="grass-layer"></div>

    <!-- LIXOS -->
    <div class="trash t1"></div>
    <div class="trash t2"></div>
    <div class="trash t3"></div>
    <div class="trash t4"></div>
    <div class="trash t5"></div>

    <!-- HOMEM -->
    <div class="worker" id="worker">

      <div class="shadow"></div>

      <div class="head"></div>

      <div class="neck"></div>

      <div class="torso"></div>

      <div class="arm arm-left">
        <div class="forearm"></div>
      </div>

      <div class="arm arm-right">
        <div class="forearm"></div>
      </div>

      <div class="leg leg-left">
        <div class="shin"></div>
      </div>

      <div class="leg leg-right">
        <div class="shin"></div>
      </div>

      <!-- VASSOURA -->
      <div class="broom-stick"></div>
      <div class="broom-head"></div>

    </div>

  </div>

  <h1>🌱 Limpeza do Campo</h1>

</div>

<script src="main.js"></script>
</body>
</html>
